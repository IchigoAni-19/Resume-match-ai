<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 10.5pt;
    color: #000;
    background: #fff;
    padding: 32px 44px;
    line-height: 1.45;
  }

  /* ── Header ── */
  .header { text-align: center; margin-bottom: 16px; }
  .name {
    font-size: 22pt;
    font-weight: 700;
    letter-spacing: 0.01em;
    margin-bottom: 5px;
  }
  .contact {
    font-size: 9.5pt;
    color: #333;
  }
  .contact a { color: #1155cc; text-decoration: none; }
  .contact .sep { margin: 0 6px; color: #888; }

  /* ── Section title ── */
  .section-title {
    font-size: 11pt;
    font-weight: 700;
    border-bottom: 1.5px solid #000;
    padding-bottom: 2px;
    margin: 14px 0 6px 0;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  /* ── Summary ── */
  .summary { font-size: 10pt; color: #111; margin-bottom: 2px; line-height: 1.55; }

  /* ── Projects ── */
  .project { margin-bottom: 10px; }
  .project-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-weight: 700;
    font-size: 10.5pt;
    margin-bottom: 1px;
  }
  .project-header a { color: #1155cc; text-decoration: none; }
  .project-tech { font-style: italic; font-size: 9.5pt; color: #333; margin-bottom: 3px; }
  ul { padding-left: 18px; margin: 3px 0; }
  li { margin-bottom: 2px; font-size: 10pt; }
  li a { color: #1155cc; text-decoration: none; }

  /* ── Skills ── */
  .skill-line { margin-bottom: 4px; font-size: 10pt; }
  .skill-label { font-weight: 700; }
</style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="name">{{name}}</div>
    <div class="contact">{{contact}}</div>
  </div>

  <!-- Summary -->
  <div class="section-title">Professional Summary</div>
  <p class="summary">{{summary}}</p>

  <!-- Projects -->
  <div class="section-title">Projects</div>
  {{projects}}

  <!-- Technical Skills -->
  <div class="section-title">Technical Skills</div>
  <div class="skill-line"><span class="skill-label">Languages:</span> {{languages}}</div>
  <div class="skill-line"><span class="skill-label">Frameworks &amp; Technologies:</span> {{frameworks}}</div>

</body>
</html>
